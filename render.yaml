services:
  - type: web
    name: lfn-backend
    runtime: docker
    repo: https://github.com/Wanderpsc/lpl-leadflow-pro.git
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_BUSINESS_ACCOUNT_ID
        sync: false
      - key: WHATSAPP_GRAPH_API_VERSION
        value: v20.0
      - key: WHATSAPP_SEND_DELAY_MS
        value: "1500"
      - key: GOOGLE_PLACES_API_KEY
        sync: false
