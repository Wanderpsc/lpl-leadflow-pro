services:
  - type: web
    name: lfn-backend
    runtime: docker
    repo: https://github.com/Wanderpsc/lpl-leadflow-pro.git
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
